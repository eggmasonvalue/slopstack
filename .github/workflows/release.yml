name: Release APK

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Install Android SDK platform 37 / build-tools 37.0.0
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-37.1" "build-tools;37.0.0"

      - name: Decode release keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Derive version from tag
        id: version
        run: |
          echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "code=$GITHUB_RUN_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Build signed release APK
        env:
          RELEASE_STORE_FILE: ${{ runner.temp }}/release.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease \
            -PreleaseVersionName="${{ steps.version.outputs.name }}" \
            -PreleaseVersionCode="${{ steps.version.outputs.code }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
